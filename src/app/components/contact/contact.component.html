<section id="contato" class="container contact">
  <div appReveal class="contact__card">
    <p class="contact__label">{{ ui[lang()].contact.label }}</p>
    <h3 class="contact__title">{{ ui[lang()].contact.title }}</h3>
    <p class="contact__text">
      {{ ui[lang()].contact.text }}
    </p>
    <div class="contact__actions">
      <a [href]="'mailto:' + profile.email" class="btn btn--primary">{{ ui[lang()].contact.emailBtn }}</a>
      <a [href]="profile.linkedin" target="_blank" rel="noopener" class="btn btn--outline">{{ ui[lang()].contact.linkedinBtn }}</a>
      <a [href]="profile.github" target="_blank" rel="noopener" class="btn btn--outline">{{ ui[lang()].contact.githubBtn }}</a>
    </div>
  </div>

  <p class="contact__footer">{{ ui[lang()].contact.footer }}</p>

  <div class="contact__easter-egg">
    <img
      src="https://media3.giphy.com/media/v1.Y2lkPTc5MGI3NjExYnRteGtxZWh5MmdkNnh1eDUzM2c3YTIzM2t0azl6OWZibWZjaXYyMyZlcD12MV9pbnRlcm5hbF9naWZfYnlfaWQmY3Q9Zw/P8ef3Dkynk0xLx1h1T/giphy.gif"
      alt="easter egg"
    />
    <p class="contact__easter-caption">{{ ui[lang()].contact.easterEgg }}</p>
  </div>
</section>
