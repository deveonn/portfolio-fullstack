<section id="trajetoria" class="container timeline">
  <p class="timeline__label">{{ ui[lang()].timeline.label }}</p>
  <h3 class="timeline__title">{{ ui[lang()].timeline.title }}</h3>
  <p class="timeline__subtitle">
    {{ ui[lang()].timeline.subtitle }}
  </p>

  <div class="timeline__rail">
    <br />
    @for (job of jobs; track job.company) {
      <div appReveal class="timeline__item">
        <span class="timeline__dot"></span>
        <p class="timeline__period">{{ job.period }}</p>
        <h4 class="timeline__company">{{ job.company }}</h4>
        <p class="timeline__role">{{ job.role }}</p>
        <p class="timeline__description">{{ job.description }}</p>
        <div class="timeline__tags">
          @for (tag of job.tags; track tag) {
            <span class="timeline__tag">{{ tag }}</span>
          }
        </div>
      </div>
    }
    <br />
  </div>
</section>
