<header class="hero container">
  <div class="hero__text">
    <p class="hero__kicker">// Olá, eu sou</p>
    <h1 class="hero__name">{{ profile.devName }}</h1>
    <h2 class="hero__role">Desenvolvedor Full-Stack</h2>
    <p class="hero__lead">
      Construo aplicações web, mobile e PWA end-to-end — do banco de dados à interface — com foco em
      produto, performance e entregas que chegam à produção.
    </p>
    <div class="hero__cta">
      <a href="#trajetoria" class="btn btn--primary">Ver trajetória ↓</a>
      <a href="#contato" class="btn btn--ghost">Contato</a>
    </div>
  </div>
  <img class="hero__avatar" [src]="profile.avatarUrl" alt="Foto de perfil" />
</header>
