<header class="hero container">
  <div class="hero__text">
    <p class="hero__kicker">{{ ui[lang()].hero.kicker }}</p>
    <h1 class="hero__name">{{ profile.devName }}</h1>
    <h2 class="hero__role">{{ ui[lang()].hero.role }}</h2>
    <p class="hero__lead">
      {{ ui[lang()].hero.lead }}
    </p>
    <div class="hero__cta">
      <a href="#trajetoria" class="btn btn--primary">{{ ui[lang()].hero.ctaPrimary }}</a>
      <a href="#contato" class="btn btn--ghost">{{ ui[lang()].hero.ctaSecondary }}</a>
    </div>
  </div>
  <img class="hero__avatar" [src]="profile.avatarUrl" alt="Foto de perfil" />
</header>
